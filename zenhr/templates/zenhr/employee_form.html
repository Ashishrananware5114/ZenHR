{% extends 'zenhr/base.html' %}

{% block content %}
<div class="container mt-4">
    <h2>Add Employee</h2>

    <form method="post">
        {% csrf_token %}

        <div class="mb-3">
            <label>Username</label>
            <input type="text" name="username" class="form-control" required>
        </div>

        <div class="mb-3">
            <label>Email</label>
            <input type="email" name="email" class="form-control" required>
        </div>

        <div class="mb-3">
            <label>First Name</label>
            <input type="text" name="first_name" class="form-control" required>
        </div>

        <div class="mb-3">
            <label>Last Name</label>
            <input type="text" name="last_name" class="form-control">
        </div>

       

        <div class="mb-3">
           <div class="mb-3">
    <div class="mb-3">
    <label>Department</label>
    <select name="department" class="form-control" required>
        <option value="HR">HR</option>
        <option value="Finance">Finance</option>
        <option value="IT">IT</option>
        <option value="Operations">Operations</option>
        <option value="Sales">Sales</option>
        <option value="Marketing">Marketing</option>
    </select>
</div>

<div class="mb-3">
    <label>Designation</label>
    <input type="text" name="designation" class="form-control" required>
</div>

        <div class="mb-3">
            <label>Basic Salary</label>
            <input type="number" step="0.01" name="basic_salary" class="form-control">
        </div>

        <div class="mb-3">
            <label>Housing Allowance</label>
            <input type="number" step="0.01" name="housing_allowance" class="form-control">
        </div>

        <div class="mb-3">
            <label>Transport Allowance</label>
            <input type="number" step="0.01" name="transport_allowance" class="form-control">
        </div>

        <div class="mb-3">
            <label>Password</label>
            <input type="password" name="password" class="form-control" value="admin123">
        </div>

        <button type="submit" class="btn btn-primary">
            Add Employee
        </button>
    </form>
</div>
{% endblock %}
