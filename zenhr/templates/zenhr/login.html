<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | ZenHR Portal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #0f172a;
            color: #f8fafc;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
        }
        .login-card {
            background-color: #1e293b;
            border: 1px solid #334155;
            border-radius: 16px;
            padding: 3rem;
            max-width: 450px;
            width: 100%;
            box-shadow: 0 10px 25px -5px rgba(0,0,0,0.3);
        }
    </style>
</head>
<body>

<div class="login-card">
    <div class="text-center mb-4">
        <h2 class="fw-bold text-white mb-1">ZenHR</h2>
        <p class="text-secondary">Convert corporate telemetry portal</p>
    </div>

    {% if form.errors %}
        <div class="alert alert-danger" role="alert">
            Username and password does not match. Please try again.
        </div>
    {% endif %}

    <form method="post" action="{% url 'login' %}">
        {% csrf_token %}
        <div class="mb-3">
            <label for="id_username" class="form-label text-secondary small fw-medium">Username</label>
            <input type="text" name="username" autofocus maxlength="150" required id="id_username" class="form-control bg-dark border-secondary text-white py-2">
        </div>
        <div class="mb-4">
            <label for="id_password" class="form-label text-secondary small fw-medium">Password</label>
            <input type="password" name="password" required id="id_password" class="form-control bg-dark border-secondary text-white py-2">
        </div>
        <button type="submit" class="btn btn-primary w-100 py-2.5 fw-semibold mb-3">Sign In</button>
    </form>
    
    <div class="text-center small text-secondary">
        Demo Creds: <code>admin</code> / <code>admin123</code>
    </div>
</div>

</body>
</html>
